<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Streaming Interface</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/shaka-player.ui.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/controls.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --neon-blue: #00d4ff;
            --neon-purple: #9400d3;
            --bg-dark: #0a0b10;
            --glass: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Poppins', sans-serif;
            overflow-x: hidden;
        }

        /* --- Header & Search --- */
        header {
            padding: 20px;
            text-align: center;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .search-container {
            margin-top: 15px;
        }

        input#search {
            background: var(--glass);
            border: 1px solid var(--neon-blue);
            padding: 12px 20px;
            border-radius: 25px;
            color: white;
            width: 80%;
            max-width: 400px;
            outline: none;
            box-shadow: 0 0 10px rgba(0, 212, 255, 0.2);
            backdrop-filter: blur(10px);
        }

        /* --- Player Container (Hidden by default) --- */
        #player-wrapper {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 1000;
        }

        .video-container {
            width: 100%;
            height: 100%;
        }

        #video {
            width: 100%;
            height: 100%;
        }

        .close-player {
            position: absolute;
            top: 20px;
            right: 20px;
            background: var(--neon-purple);
            border: none;
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            z-index: 1001;
            box-shadow: 0 0 15px var(--neon-purple);
            font-weight: bold;
        }

        /* --- Grid de Canales --- */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 20px;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .channel-card {
            background: var(--glass);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .channel-card:hover {
            transform: translateY(-5px);
            border-color: var(--neon-blue);
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.4);
        }

        .channel-card img {
            width: 80px;
            height: 80px;
            object-fit: contain;
            margin-bottom: 10px;
            filter: drop-shadow(0 0 5px rgba(255,255,255,0.2));
        }

        .channel-card span {
            font-size: 0.9rem;
            font-weight: 400;
            display: block;
        }

        /* --- Responsive --- */
        @media (max-width: 600px) {
            .grid-container {
                grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
                gap: 10px;
            }
            .channel-card img { width: 60px; height: 60px; }
        }
    </style>
</head>
<body>

    <header>
        <h2 style="color: var(--neon-blue); text-shadow: 0 0 10px var(--neon-blue);">NEON STREAM</h2>
        <div class="search-container">
            <input type="text" id="search" placeholder="Buscar canal...">
        </div>
    </header>

    <div id="player-wrapper">
        <button class="close-player" onclick="closePlayer()">✕ CERRAR</button>
        <div class="video-container" id="video-parent">
            <video id="video" autoplay></video>
        </div>
    </div>

    <div class="grid-container" id="channel-grid">
        </div>

    <script>
        let allChannels = [];
        let player;
        let ui;

        // Inicializar Shaka Player
        async function initApp() {
            shaka.polyfill.installAll();
            if (shaka.Player.isBrowserSupported()) {
                initPlayer();
            } else {
                console.error('Navegador no compatible con Shaka Player');
            }
            loadChannels();
        }

        async function initPlayer() {
            const video = document.getElementById('video');
            const videoParent = document.getElementById('video-parent');
            
            player = new shaka.Player(video);
            
            // Configuración de UI oficial
            ui = new shaka.ui.Overlay(player, videoParent, video);

            // Filtro de red para Headers (Tigo Sports / Others)
            player.getNetworkingEngine().registerRequestFilter((type, request) => {
                if (type == shaka.net.NetworkingEngine.RequestType.MANIFEST || 
                    type == shaka.net.NetworkingEngine.RequestType.SEGMENT) {
                    request.headers['User-Agent'] = 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36';
                    request.headers['Origin'] = 'https://tigosports.com.py'; 
                }
            });

            player.addEventListener('error', onPlayerError);
        }

        async function loadChannels() {
            const url = 'https://raw.githubusercontent.com/MAIKOL-BLACK/playpre/main/canales.json';
            try {
                const response = await fetch(url);
                const data = await response.json();
                
                // Mapeo Crítico: El JSON es un array de categorías
                data.forEach(category => {
                    if (category.samples) {
                        category.samples.forEach(sample => {
                            allChannels.push(sample);
                        });
                    }
                });

                displayChannels(allChannels);
            } catch (e) {
                console.error("Error cargando JSON", e);
            }
        }

        function displayChannels(channels) {
            const grid = document.getElementById('channel-grid');
            grid.innerHTML = '';

            channels.forEach(channel => {
                const card = document.createElement('div');
                card.className = 'channel-card';
                card.onclick = () => playChannel(channel);

                card.innerHTML = `
                    <img src="${channel.icono}" onerror="this.src='https://via.placeholder.com/80?text=TV'">
                    <span>${channel.name}</span>
                `;
                grid.appendChild(card);
            });
        }

        async function playChannel(item) {
            document.getElementById('player-wrapper').style.display = 'block';
            
            const drmConfig = {};
            if (item.drm_license_uri) {
                // Configuración de ClearKey DRM
                drmConfig.servers = {
                    'org.w3.clearkey': item.drm_license_uri
                };
            }

            try {
                await player.configure({
                    drm: drmConfig
                });

                await player.load(item.url);
                console.log('Reproduciendo:', item.name);
            } catch (e) {
                onPlayerError(e);
            }
        }

        function closePlayer() {
            document.getElementById('player-wrapper').style.display = 'none';
            player.unload();
        }

        function onPlayerError(event) {
            console.error('Error en el reproductor', event);
            alert("Error al cargar el stream. Verifique la fuente o el DRM.");
        }

        // Buscador en tiempo real
        document.getElementById('search').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const filtered = allChannels.filter(c => c.name.toLowerCase().includes(term));
            displayChannels(filtered);
        });

        document.addEventListener('DOMContentLoaded', initApp);
    </script>
</body>
</html>
